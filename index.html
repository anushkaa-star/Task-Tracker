<!DOCTYPE html>
<html>
<head>
    <title>Task Tracker</title>
    <link rel="stylesheet" href="todo.css">
</head>
<body>

    <h1 id="main-heading">Task Tracker</h1>

    <div class="todo-grid">
        <input id="todo-input" type="text" placeholder="Enter TODO here">

        <input id="todo-date" type="date">

        <button id="button" onclick="addTodo()">Add
        </button>
       <button id="clear-btn" onclick="clearCompleted()">
    🗑 Clear Completed
</button>
    </div>

    <div class="todo-container"></div>

    <script src="todo.js"></script>

</body>
</html>
